<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>local-agent-web — Quickstart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --orange: #d29922;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }

    /* Sidebar */
    #sidebar {
      width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    #sidebar-header h2 { font-size: 13px; font-weight: 600; flex: 1; }
    #new-session-btn {
      padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--accent); font-size: 12px; cursor: pointer;
    }
    #new-session-btn:hover { background: rgba(88, 166, 255, 0.1); }
    #session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; transition: background 0.15s;
    }
    .session-item:hover { background: rgba(255,255,255,0.04); }
    .session-item.active { background: rgba(88, 166, 255, 0.1); border-color: var(--accent); }
    .session-item .session-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item .session-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
    .session-item .session-id { font-family: monospace; font-size: 10px; color: var(--muted); }

    /* Main chat area */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    header { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; }
    #status { font-size: 12px; padding: 2px 10px; border-radius: 10px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); }
    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .msg.user .avatar { background: var(--accent); }
    .msg.assistant .avatar { background: #8957e5; }
    .msg.tool .avatar { background: var(--orange); }
    .msg.system .avatar { background: var(--border); }
    .bubble { padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; font-size: 14px; }
    .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: var(--surface); border-bottom-left-radius: 4px; }
    .msg.tool .bubble { background: rgba(210, 153, 34, 0.1); font-family: monospace; font-size: 12px; }
    .msg.system .bubble { background: transparent; color: var(--muted); font-size: 12px; }
    .empty { text-align: center; color: var(--muted); margin: auto; }
    .empty h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .empty p { font-size: 13px; }
    footer { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; }
    #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; resize: none; font-family: inherit; }
    #input:focus { border-color: var(--accent); }
    button#send { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-weight: 500; cursor: pointer; font-size: 14px; }
    button#send:disabled { background: var(--border); color: var(--muted); cursor: default; }
    #spinner { display: none; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Sessions</h2>
      <button id="new-session-btn">+ New</button>
    </div>
    <div id="session-list"></div>
  </div>
  <div id="main">
    <header>
      <span class="dot red" id="dot"></span>
      <span id="status" style="color: var(--muted);">Disconnected</span>
      <h1>local-agent-web</h1>
      <span style="flex:1"></span>
      <span id="session-label" style="font-size:11px; color: var(--muted);"></span>
      <div id="spinner"></div>
    </header>
    <div id="messages">
      <div class="empty">
        <h2>local-agent-web</h2>
        <p>Chat with Claude via the agent-web framework.<br>Type a message below to start.</p>
      </div>
    </div>
    <footer>
      <input type="text" id="input" placeholder="Ask Claude..." disabled autocomplete="off" />
      <button id="send" disabled>Send</button>
    </footer>
  </div>

  <script type="module">
    const BASE = window.location.origin;
    const WS = BASE.replace(/^http/, 'ws') + '/ws';
    let ws, streamEl;

    const sessions = new Map();
    let activeSessionId = null;

    const $msg = document.getElementById('messages');
    const $in = document.getElementById('input');
    const $send = document.getElementById('send');
    const $dot = document.getElementById('dot');
    const $status = document.getElementById('status');
    const $sessionLabel = document.getElementById('session-label');
    const $spinner = document.getElementById('spinner');
    const $sessionList = document.getElementById('session-list');
    const $newBtn = document.getElementById('new-session-btn');

    function setStatus(s) {
      $dot.className = 'dot ' + ({connected:'green',connecting:'orange'}[s]||'red');
      $status.textContent = s.charAt(0).toUpperCase() + s.slice(1);
      $status.style.color = s === 'connected' ? 'var(--green)' : s === 'connecting' ? 'var(--orange)' : 'var(--muted)';
      $in.disabled = s !== 'connected';
      $send.disabled = s !== 'connected';
    }

    function addMsg(role, text) {
      if ($msg.querySelector('.empty')) $msg.querySelector('.empty').remove();
      const icons = { user: '👤', assistant: '🤖', tool: '🔧', system: 'ℹ️' };
      const d = document.createElement('div');
      d.className = 'msg ' + role;
      d.innerHTML = `<div class="avatar">${icons[role]||'•'}</div><div class="bubble"></div>`;
      d.querySelector('.bubble').textContent = text;
      $msg.appendChild(d);
      $msg.scrollTop = $msg.scrollHeight;
      return d.querySelector('.bubble');
    }

    function saveSessionMessage(sessionId, role, text) {
      if (!sessionId || !sessions.has(sessionId)) return;
      const s = sessions.get(sessionId);
      s.messages.push({ role, text, ts: Date.now() });
      if (s.messages.length === 1 && role === 'user') {
        s.title = text.length > 40 ? text.slice(0, 40) + '...' : text;
      }
      renderSessionList();
    }

    function renderSessionList() {
      $sessionList.innerHTML = '';
      const sorted = [...sessions.entries()].sort((a, b) => b[1].updatedAt - a[1].updatedAt);
      for (const [id, s] of sorted) {
        const el = document.createElement('div');
        el.className = 'session-item' + (id === activeSessionId ? ' active' : '');
        const time = new Date(s.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        el.innerHTML = `
          <div class="session-title">${escHtml(s.title)}</div>
          <div class="session-meta">
            <span>${s.messages.length} msgs</span>
            <span>${time}</span>
          </div>
          <div class="session-id">${id.slice(0, 8)}</div>
        `;
        el.onclick = () => switchSession(id);
        $sessionList.appendChild(el);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function switchSession(id) {
      activeSessionId = id;
      const s = sessions.get(id);
      $sessionLabel.textContent = 'Session: ' + id.slice(0, 8) + '...';
      streamEl = null;
      renderMessages(s);
      renderSessionList();
    }

    function renderMessages(s) {
      $msg.innerHTML = '';
      if (!s || s.messages.length === 0) {
        $msg.innerHTML = '<div class="empty"><h2>local-agent-web</h2><p>Chat with Claude via the agent-web framework.<br>Type a message below to start.</p></div>';
        return;
      }
      for (const m of s.messages) {
        addMsg(m.role, m.text);
      }
    }

    async function createNewSession() {
      const r = await fetch(BASE + '/chat/start', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ config: {} })
      });
      const d = await r.json();
      const id = d.sessionId;
      sessions.set(id, {
        id, title: 'New conversation', messages: [],
        createdAt: Date.now(), updatedAt: Date.now(),
        config: d.config,
      });
      switchSession(id);
      return id;
    }

    function connect() {
      setStatus('connecting');
      ws = new WebSocket(WS);
      ws.onopen = () => ws.send(JSON.stringify({
        v: 1, type: 'sys:connect',
        payload: { clientType: 'quickstart', protocolVersion: 1 },
        source: 'client', timestamp: Date.now()
      }));
      ws.onmessage = e => {
        const m = JSON.parse(e.data);
        if (m.type === 'sys:connect') { setStatus('connected'); return; }
        handle(m);
      };
      ws.onclose = () => { setStatus('disconnected'); setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
    }

    function handle(m) {
      const sid = m.sessionId;
      if (sid && sid !== activeSessionId) return;

      switch (m.type) {
        case 'chat:stream':
          $spinner.style.display = 'block';
          if (!streamEl) streamEl = addMsg('assistant', '');
          streamEl.textContent = m.payload.fullText || m.payload.delta;
          $msg.scrollTop = $msg.scrollHeight;
          break;
        case 'chat:assistant':
          $spinner.style.display = 'none';
          if (streamEl) { streamEl.textContent = m.payload.text; streamEl = null; }
          else addMsg('assistant', m.payload.text);
          saveSessionMessage(sid, 'assistant', m.payload.text);
          if (sessions.has(sid)) sessions.get(sid).updatedAt = Date.now();
          break;
        case 'chat:tool-use':
          addMsg('tool', m.payload.toolName);
          saveSessionMessage(sid, 'tool', m.payload.toolName);
          break;
        case 'chat:tool-result':
          if (m.payload.output) {
            const txt = m.payload.output.slice(0, 300) + (m.payload.output.length > 300 ? '...' : '');
            addMsg('tool', txt);
            saveSessionMessage(sid, 'tool', txt);
          }
          break;
        case 'chat:error':
          addMsg('system', 'Error: ' + (m.payload.message || 'unknown'));
          $spinner.style.display = 'none';
          break;
        case 'chat:status':
          $spinner.style.display = ['thinking','streaming'].includes(m.payload.status) ? 'block' : 'none';
          break;
      }
    }

    async function send() {
      const text = $in.value.trim();
      if (!text) return;
      if (!activeSessionId) {
        await createNewSession();
      }
      addMsg('user', text);
      saveSessionMessage(activeSessionId, 'user', text);
      if (sessions.has(activeSessionId)) sessions.get(activeSessionId).updatedAt = Date.now();
      $in.value = '';
      $spinner.style.display = 'block';
      await fetch(BASE + '/chat/message', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ sessionId: activeSessionId, text })
      });
    }

    $send.onclick = send;
    $in.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
    $newBtn.onclick = createNewSession;
    connect();
    renderSessionList();
  </script>
</body>
</html>
