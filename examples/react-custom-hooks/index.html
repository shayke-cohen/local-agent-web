<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agent-web — Custom Hooks Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #c9d1d9; height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      padding: 12px 24px; border-bottom: 1px solid #30363d;
      background: #161b22; display: flex; justify-content: space-between; align-items: center;
    }
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 250px; border-right: 1px solid #30363d; background: #161b22;
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .sidebar h3 { padding: 12px 16px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #30363d; }
    .session-list { padding: 8px; flex: 1; }
    .session-item {
      padding: 8px 12px; border-radius: 6; cursor: pointer; margin-bottom: 4px; font-size: 13px;
    }
    .session-item:hover { background: #21262d; }
    .chat { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin-bottom: 12px; display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg-bubble {
      max-width: 70%; padding: 10px 14px; border-radius: 12; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .msg-bubble { background: #58a6ff; color: #fff; }
    .msg.assistant .msg-bubble { background: #21262d; color: #c9d1d9; }
    .msg.tool .msg-bubble {
      background: #161b22; border: 1px solid #30363d; font-size: 12px;
      color: #8b949e; font-family: monospace; max-width: 90%;
    }
    .input-bar {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #30363d; background: #161b22;
    }
    #message-input {
      flex: 1; padding: 8px 12px; border-radius: 6;
      border: 1px solid #30363d; background: #0d1117;
      color: #c9d1d9; outline: none; font-size: 14px;
    }
    button {
      padding: 8px 16px; border-radius: 6; border: none;
      background: #58a6ff; color: #fff; cursor: pointer; font-weight: 500;
    }
    button:disabled { background: #21262d; color: #8b949e; cursor: default; }
    .status { font-size: 12px; color: #8b949e; }
    .new-session-btn {
      margin: 8px; padding: 6px; border-radius: 6;
      border: 1px dashed #30363d; background: none;
      color: #8b949e; cursor: pointer; font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1 style="font-size: 16px;">Claude Chat <span class="status" id="conn-status">connecting...</span></h1>
    <div class="status" id="config-display"></div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <h3>Sessions</h3>
      <div class="session-list" id="session-list"></div>
      <button class="new-session-btn" id="new-session-btn">+ New Session</button>
    </div>
    <div class="chat">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <input type="text" id="message-input" placeholder="Type a message..." />
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    const BASE = window.location.origin;
    let sessionId = null;
    let ws = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const statusEl = document.getElementById('conn-status');
    const configEl = document.getElementById('config-display');
    const sessionListEl = document.getElementById('session-list');

    async function fetchConfig() {
      const resp = await fetch(`${BASE}/chat/config`);
      const data = await resp.json();
      configEl.textContent = `Model: ${data.config?.model || '?'} | Tools: ${data.config?.tools?.length || 0}`;
    }

    async function refreshSessions() {
      const resp = await fetch(`${BASE}/chat/sessions`);
      const data = await resp.json();
      sessionListEl.innerHTML = '';
      (data.sessions || []).forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item';
        div.textContent = s.summary || s.sessionId.slice(0, 12);
        div.onclick = () => resumeSession(s.sessionId);
        sessionListEl.appendChild(div);
      });
    }

    async function createSession() {
      const resp = await fetch(`${BASE}/chat/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ config: {} }),
      });
      const data = await resp.json();
      sessionId = data.sessionId;
      messagesEl.innerHTML = '';
      addSystemMessage(`Session created: ${sessionId.slice(0, 12)}...`);
      refreshSessions();
    }

    async function resumeSession(sid) {
      const resp = await fetch(`${BASE}/chat/resume`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sid, config: {} }),
      });
      const data = await resp.json();
      sessionId = data.sessionId;
      messagesEl.innerHTML = '';
      addSystemMessage(`Resumed session: ${sessionId.slice(0, 12)}...`);
    }

    function connectWS() {
      const wsUrl = BASE.replace(/^http/, 'ws');
      ws = new WebSocket(`${wsUrl}/ws`);

      ws.onopen = () => {
        statusEl.textContent = 'connected';
        statusEl.style.color = '#3fb950';
        ws.send(JSON.stringify({
          v: 1, type: 'sys:connect',
          payload: { clientType: 'browser', protocolVersion: 1 },
          source: 'client', timestamp: Date.now(),
        }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        statusEl.textContent = 'disconnected';
        statusEl.style.color = '#f85149';
        setTimeout(connectWS, 3000);
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'chat:stream':
          updateStreamingMessage(msg.payload.fullText || msg.payload.delta);
          break;
        case 'chat:assistant':
          finalizeMessage(msg.payload.text);
          break;
        case 'chat:tool-use':
          addToolMessage(`Using ${msg.payload.toolName}`);
          break;
        case 'chat:tool-result':
          const out = typeof msg.payload.output === 'string'
            ? msg.payload.output.slice(0, 500)
            : JSON.stringify(msg.payload.output).slice(0, 500);
          addToolMessage(out);
          break;
        case 'chat:error':
          addSystemMessage(`Error: ${msg.payload.message}`);
          break;
      }
    }

    let streamingEl = null;

    function updateStreamingMessage(text) {
      if (!streamingEl) {
        const div = document.createElement('div');
        div.className = 'msg assistant';
        div.innerHTML = '<div class="msg-bubble"></div>';
        messagesEl.appendChild(div);
        streamingEl = div.querySelector('.msg-bubble');
      }
      streamingEl.textContent = text;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function finalizeMessage(text) {
      if (streamingEl) {
        streamingEl.textContent = text;
        streamingEl = null;
      } else {
        addMessage('assistant', text);
      }
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addToolMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg tool';
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.style.cssText = 'text-align:center;color:#8b949e;font-size:12px;margin:8px 0;';
      div.textContent = text;
      messagesEl.appendChild(div);
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      if (!sessionId) await createSession();

      addMessage('user', text);
      inputEl.value = '';

      await fetch(`${BASE}/chat/message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, text }),
      });
    }

    sendBtn.onclick = sendMessage;
    inputEl.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
    document.getElementById('new-session-btn').onclick = createSession;

    fetchConfig();
    refreshSessions();
    connectWS();
  </script>
</body>
</html>
