<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agent-web — Embeddable Component Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header p { font-size: 13px; color: #8b949e; margin-top: 4px; }
    #chat-container {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Embeddable Component Demo</h1>
    <p>Drop-in &lt;ClaudeChat /&gt; component — zero custom code needed.</p>
  </header>
  <div id="chat-container">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    // In a real app you'd import from '@shaykec/agent-web/components'
    // For this demo we inline a simplified version since we can't use ESM imports with CDN React

    const { useState, useRef, useEffect, useCallback, useContext, createContext, useMemo } = React;

    // Minimal provider that connects via fetch (no WS for simplicity in CDN demo)
    const ChatContext = createContext(null);

    function SimpleChatProvider({ url, children }) {
      const [messages, setMessages] = useState([]);
      const [sessionId, setSessionId] = useState(null);
      const [status, setStatus] = useState('idle');

      const send = useCallback(async (text) => {
        if (!text.trim()) return;

        setMessages(prev => [...prev, { id: Date.now(), role: 'user', text }]);

        let sid = sessionId;
        if (!sid) {
          const resp = await fetch(`${url}/chat/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ config: {} }),
          });
          const data = await resp.json();
          sid = data.sessionId;
          setSessionId(sid);
        }

        setStatus('streaming');
        const resp = await fetch(`${url}/chat/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: sid, text }),
        });
        setStatus('idle');
      }, [url, sessionId]);

      const value = useMemo(() => ({ messages, send, status, sessionId }), [messages, send, status, sessionId]);

      return <ChatContext.Provider value={value}>{children}</ChatContext.Provider>;
    }

    function ChatUI() {
      const { messages, send, status } = useContext(ChatContext);
      const [input, setInput] = useState('');
      const endRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!input.trim()) return;
        send(input.trim());
        setInput('');
      };

      return (
        <div style={{
          display: 'flex', flexDirection: 'column', height: '100%',
          background: '#0d1117', borderRadius: 12, border: '1px solid #30363d', overflow: 'hidden',
        }}>
          <div style={{
            padding: '8px 16px', borderBottom: '1px solid #30363d',
            background: '#161b22', display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <span style={{ fontWeight: 600 }}>Claude</span>
            <span style={{
              width: 8, height: 8, borderRadius: '50%',
              background: status === 'streaming' ? '#f59e0b' : '#3fb950',
            }} />
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
            {messages.length === 0 && (
              <div style={{ textAlign: 'center', color: '#8b949e', marginTop: 60 }}>
                Start a conversation with Claude
              </div>
            )}
            {messages.map(msg => (
              <div key={msg.id} style={{
                display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
                marginBottom: 12,
              }}>
                <div style={{
                  maxWidth: '80%', padding: '10px 14px', borderRadius: 12,
                  background: msg.role === 'user' ? '#58a6ff' : '#21262d',
                  color: msg.role === 'user' ? '#fff' : '#c9d1d9',
                  whiteSpace: 'pre-wrap', lineHeight: 1.5,
                }}>
                  {msg.text}
                </div>
              </div>
            ))}
            <div ref={endRef} />
          </div>

          <form onSubmit={handleSubmit} style={{
            display: 'flex', gap: 8, padding: '12px 16px',
            borderTop: '1px solid #30363d', background: '#161b22',
          }}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              placeholder="Ask Claude..."
              style={{
                flex: 1, padding: '8px 12px', borderRadius: 6,
                border: '1px solid #30363d', background: '#0d1117',
                color: '#c9d1d9', outline: 'none', fontSize: 14,
              }}
            />
            <button type="submit" disabled={!input.trim()} style={{
              padding: '8px 16px', borderRadius: 6, border: 'none',
              background: input.trim() ? '#58a6ff' : '#21262d',
              color: input.trim() ? '#fff' : '#8b949e',
              cursor: input.trim() ? 'pointer' : 'default', fontWeight: 500,
            }}>
              Send
            </button>
          </form>
        </div>
      );
    }

    function App() {
      const url = window.location.origin;
      return (
        <SimpleChatProvider url={url}>
          <ChatUI />
        </SimpleChatProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
