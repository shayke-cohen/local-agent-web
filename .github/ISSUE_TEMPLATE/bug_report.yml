name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the framework is affected?
      options:
        - Protocol (messages, envelope, config)
        - Server (middleware, session manager, transport)
        - React Client (hooks, provider, components)
        - Vanilla Client (ClaudeClient)
        - Examples
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Set up server with ...
        2. Connect client with ...
        3. Send message ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details.
      placeholder: |
        - Node.js version:
        - @shaykec/agent-web version:
        - OS:
        - Browser (if applicable):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error messages or logs.
      render: shell
    validations:
      required: false
