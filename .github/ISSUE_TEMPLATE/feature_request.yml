name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the framework does this relate to?
      options:
        - Protocol (messages, envelope, config)
        - Server (middleware, session manager, transport)
        - React Client (hooks, provider, components)
        - Vanilla Client (ClaudeClient)
        - Examples
        - New module / Cross-cutting
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: I'm trying to ... but currently ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?
    validations:
      required: false
